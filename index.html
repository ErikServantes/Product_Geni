<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estúdio IA - Erik Servantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Garante que o vídeo preencha o container sem distorcer */
        #video { object-fit: cover; width: 100%; height: 100%; background: #000; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md space-y-6">
        <header class="text-center py-4">
            <h1 class="text-3xl font-black tracking-tighter text-blue-500">PRO<span class="text-white">GENI</span></h1>
            <p class="text-slate-400 text-xs uppercase tracking-widest">IA Product Studio</p>
        </header>

        <div class="relative bg-slate-800 rounded-[2.5rem] p-3 shadow-2xl border border-slate-700 overflow-hidden aspect-[3/4]">
            <video id="video" autoplay playsinline class="rounded-[2rem]"></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-64 border-2 border-white/20 rounded-full border-dashed"></div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-[2rem] backdrop-blur-md border border-slate-700 space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">URL do Servidor (Auto-Sync)</label>
                <input type="text" id="api-url" placeholder="Aguardando sincronização..." 
                       class="w-full bg-slate-900 border border-slate-600 p-3 rounded-xl text-sm text-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button id="btn-main" onclick="takePhoto()" 
                    class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                <span>FOTOGRAFAR PRODUTO</span>
            </button>
        </div>

        <div id="status" class="hidden flex flex-col items-center py-6 animate-fade-in">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-10 w-10 mb-3"></div>
            <p class="text-blue-400 font-medium text-sm">O Gemini está a processar a arte...</p>
        </div>

        <div id="result" class="hidden space-y-4 pb-10">
            <div class="relative group">
                <img id="res-img" class="w-full rounded-3xl border-4 border-slate-700 shadow-2xl transition-all">
                <div class="absolute top-4 right-4 bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">GERADO POR IA</div>
            </div>
            <a id="dl-btn" class="block w-full bg-white text-slate-900 text-center py-4 rounded-2xl font-black text-sm tracking-tighter uppercase shadow-xl active:scale-95 transition-all">
                GUARDAR NO TELEMÓVEL
            </a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const REPO_PATH = "erikservantes/Product_Geni";

        // 1. Sincronização Automática com o GitHub
        async function carregarUrlAutomatica() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${REPO_PATH}/main/url_servidor.txt?t=${Date.now()}`);
                if (response.ok) {
                    const urlRaw = await response.text();
                    document.getElementById('api-url').value = urlRaw.trim();
                    console.log("🔗 URL Sincronizada com sucesso!");
                }
            } catch (e) {
                console.error("Erro ao sincronizar link.");
            }
        }

        // 2. Setup da Câmara
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Câmara bloqueada! Verifique as permissões do browser.");
            }
        }

        // 3. Capturar e Enviar
        async function takePhoto() {
            const apiUrl = document.getElementById('api-url').value.trim();
            if(!apiUrl) return alert("Erro: O link do servidor ainda não foi sincronizado.");

            const btn = document.getElementById('btn-main');
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            status.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            // Captura frame do vídeo
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('image', blob, 'original.jpg');

                try {
                    const response = await fetch(`${apiUrl}/process`, {
                        method: 'POST',
                        body: fd
                    });

                    if (!response.ok) throw new Error("Servidor Offline");

                    const resBlob = await response.blob();
                    const imgUrl = URL.createObjectURL(resBlob);
                    
                    document.getElementById('res-img').src = imgUrl;
                    document.getElementById('dl-btn').href = imgUrl;
                    document.getElementById('dl-btn').download = `produto_${Date.now()}.png`;
                    
                    resultDiv.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } catch (e) {
                    alert("Erro: O servidor Colab não respondeu. Verifique se a célula está a correr.");
                } finally {
                    btn.disabled = false;
                    status.classList.add('hidden');
                }
            }, 'image/jpeg', 0.9);
        }

        // Iniciar App
        window.onload = () => {
            initCamera();
            carregarUrlAutomatica();
        };
    </script>
</body>
</html>
